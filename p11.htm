<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practical 11</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #eef2f7;
}
h2 {
    color: #007bff;
    margin-bottom: 10px;
}

.api-section {
    background: #fff;
    padding: 20px;
    margin-bottom: 20px;
    border-left: 5px solid #007bff;
    border-right: 5px solid #007bff;
    border-radius: 10px;
}
.box {
    border: 2px dashed #aaa;
    padding: 20px;
    min-height: 100px;
    text-align: center;
    margin-top: 10px;
    border-radius: 5px;
    background: #fafafa;
}
#dragItem {
    display: inline-block;
    padding: 10px 20px;
    color: white;
    cursor: grab;
    border-radius: 10px;
    margin: 10px 0;
}
button {
    padding: 8px 15px;
    margin-top: 10px;
    margin-right: 5px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
button:hover {
    background: #0056b3;
}
input {
    padding: 8px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
p {
    margin-top: 10px;
    color: #333;
}
    </style>
</head>
<body>
    <div class="container">

        <div class="api-section">
            <h2>Drag & Drop</h2>
            <img src="zenitsu.jpeg" id="dragItem" draggable="true" alt="Drag Image">
            <div class="box" id="dropBox">
                Drop here
            </div>
        </div>

     
        <div class="api-section">
            <h2>Geolocation</h2>
            <button onclick="getLocation()">Get Location</button>
            <p id="locationOutput">Location will appear here</p>
        </div>

        
        <div class="api-section">
            <h2>Web Storage</h2>
            <input type="text" id="nameInput" placeholder="Enter your name">
            <br>
            <button onclick="saveData()">Save</button>
            <button onclick="loadData()">Load</button>
            <p id="storageOutput"></p>
        </div>

    </div>

    <script>
      
        const dragItem = document.getElementById("dragItem");
        const dropBox = document.getElementById("dropBox");

        dragItem.addEventListener("dragstart", function(e) {
            e.dataTransfer.setData("text", e.target.id);
        });

        dropBox.addEventListener("dragover", function(e) {
            e.preventDefault();
        });

        dropBox.addEventListener("drop", function(e) {
            e.preventDefault();
            const data = e.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            dropBox.appendChild(draggedElement);
        });

      
        function getLocation() {
            const output = document.getElementById("locationOutput");

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        output.innerHTML = 
                            "Latitude: " + position.coords.latitude + "<br>" +
                            "Longitude: " + position.coords.longitude;
                    },
                    error => {
                        output.innerHTML = "Error getting location";
                    }
                );
            } else {
                output.innerHTML = "Geolocation not supported";
            }
        }

        
        function saveData() {
            const name = document.getElementById("nameInput").value;
            localStorage.setItem("username", name);
            alert("Data saved!");
        }

        function loadData() {
            const name = localStorage.getItem("username");
            document.getElementById("storageOutput").innerText =
                name ? "Stored Name: " + name : "No data found";
        }
    </script>

</body>
</html>
